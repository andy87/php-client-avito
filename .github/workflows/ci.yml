name: php-client-avito

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: composer install --no-interaction --prefer-dist
      - run: composer validate --strict

      - name: Guard legacy SDK namespace
        run: |
          if grep -RInE "Andy87\\\\ClientsBase|andy87/clients-base" src tests tools README.md docs composer.json; then
            echo "php-client-avito must use andy87/php-client-sdk, not the legacy clients-base package."
            exit 1
          fi

      - run: find src tests -name '*.php' -print0 | xargs -0 -n 1 php -l
      - run: composer analyse
      - run: composer test
